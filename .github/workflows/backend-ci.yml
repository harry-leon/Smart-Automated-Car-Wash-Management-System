name: Backend CI

on:
  pull_request:
    branches:
      - dev
    paths:
      - "autowash-backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - dev
    paths:
      - "autowash-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autowash-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test
