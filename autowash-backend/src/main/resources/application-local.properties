spring.application.name=autowash-backend

spring.datasource.url=${AUTOWASH_DB_URL:jdbc:h2:mem:autowash;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1}
spring.datasource.username=${AUTOWASH_DB_USERNAME:sa}
spring.datasource.password=${AUTOWASH_DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=${AUTOWASH_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

springdoc.swagger-ui.path=/swagger-ui.html

