spring:
  application:
    name: autowash-backend
  datasource:
    url: jdbc:h2:mem:autowash;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

autowash:
  auth:
    jwt:
      secret: ${AUTOWASH_JWT_SECRET:dev-only-change-me-autowash-secret-key-please}
      access-token-ttl-seconds: 3600

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/autowash}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:autowash}
    password: ${DATABASE_PASSWORD:autowash}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
