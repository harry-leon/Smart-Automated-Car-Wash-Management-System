spring:
  application:
    name: autowash-backend
  security:
    user:
      name: ${AUTOWASH_SECURITY_USER:autowash}
      password: ${AUTOWASH_SECURITY_PASSWORD:autowash-dev-password}
  datasource:
    url: ${AUTOWASH_DB_URL:jdbc:postgresql://localhost:5432/autowash}
    username: ${AUTOWASH_DB_USERNAME:autowash}
    password: ${AUTOWASH_DB_PASSWORD:autowash}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AutoWashPostgresPool
      maximum-pool-size: ${AUTOWASH_DB_POOL_SIZE:10}
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        boot:
          allow_jdbc_metadata_access: false
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  h2:
    console:
      enabled: ${AUTOWASH_H2_CONSOLE_ENABLED:false}
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

autowash:
  currency: VND
  loyalty:
    points-unit-amount: 10000
  api:
    version: v1
    base-path: /api/v1
  auth:
    jwt:
      secret: ${AUTOWASH_JWT_SECRET:autowash-secret-key-for-jwt-signing-2026}
      access-token-expiration-seconds: ${AUTOWASH_JWT_ACCESS_TTL:3600}
      refresh-token-expiration-seconds: ${AUTOWASH_JWT_REFRESH_TTL:2592000}
    otp:
      expiration-seconds: ${AUTOWASH_OTP_TTL:300}
      max-attempts: ${AUTOWASH_OTP_MAX_ATTEMPTS:3}
      expose-for-dev: ${AUTOWASH_OTP_EXPOSE_FOR_DEV:true}
