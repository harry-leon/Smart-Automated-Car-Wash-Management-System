spring:
  application:
    name: autowash-backend
  security:
    user:
      name: ${AUTOWASH_SECURITY_USER:autowash}
      password: ${AUTOWASH_SECURITY_PASSWORD:autowash-dev-password}
  datasource:
    url: ${AUTOWASH_DB_URL:jdbc:postgresql://localhost:5432/autowash}
    username: ${AUTOWASH_DB_USERNAME:autowash}
    password: ${AUTOWASH_DB_PASSWORD:autowash}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AutoWashPostgresPool
      maximum-pool-size: ${AUTOWASH_DB_POOL_SIZE:10}
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        boot:
          allow_jdbc_metadata_access: false
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration, classpath:db/demo
    baseline-on-migrate: true
  h2:
    console:
      enabled: ${AUTOWASH_H2_CONSOLE_ENABLED:false}
      path: /h2-console
  mail:
    host: ${AUTOWASH_MAIL_HOST:smtp.gmail.com}
    port: ${AUTOWASH_MAIL_PORT:587}
    username: ${AUTOWASH_MAIL_USERNAME:auracarwash.vn@gmail.com}
    password: ${AUTOWASH_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

autowash:
  currency: VND
  api:
    version: v1
    base-path: /api/v1
  email:
    provider: ${AUTOWASH_MAIL_PROVIDER:logging}
    from: ${AUTOWASH_MAIL_FROM:auracarwash.vn@gmail.com}
    from-name: ${AUTOWASH_MAIL_FROM_NAME:AURA Car Wash}
  auth:
    jwt:
      secret: ${AUTOWASH_JWT_SECRET:autowash-secret-key-for-jwt-signing-2026}
      access-token-expiration-seconds: ${AUTOWASH_JWT_ACCESS_TTL:3600}
      refresh-token-expiration-seconds: ${AUTOWASH_JWT_REFRESH_TTL:2592000}
    otp:
      expiration-seconds: ${AUTOWASH_OTP_TTL:300}
      max-attempts: ${AUTOWASH_OTP_MAX_ATTEMPTS:5}
      expose-for-dev: ${AUTOWASH_OTP_EXPOSE_FOR_DEV:true}
    google:
      client-id: ${AUTOWASH_GOOGLE_CLIENT_ID:}
      client-secret: ${AUTOWASH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${AUTOWASH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
      frontend-base-url: ${AUTOWASH_FRONTEND_BASE_URL:http://localhost:3000}
      ticket-ttl-seconds: ${AUTOWASH_GOOGLE_TICKET_TTL:300}
