# Core app
spring.application.name=autowash-backend

# Security
spring.security.user.name=${AUTOWASH_SECURITY_USER:autowash}
spring.security.user.password=${AUTOWASH_SECURITY_PASSWORD:autowash-dev-password}

# Database
spring.datasource.url=${AUTOWASH_DB_URL:jdbc:postgresql://localhost:5432/autowash}
spring.datasource.username=${AUTOWASH_DB_USERNAME:autowash}
spring.datasource.password=${AUTOWASH_DB_PASSWORD:autowash}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=AutoWashPostgresPool
spring.datasource.hikari.maximum-pool-size=${AUTOWASH_DB_POOL_SIZE:10}
spring.datasource.hikari.initialization-fail-timeout=0

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.hbm2ddl.auto=validate
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.format_sql=true

# Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Local console
spring.h2.console.enabled=${AUTOWASH_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Server
server.port=${SERVER_PORT:8080}

# API docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Domain config
autowash.currency=VND
autowash.api.version=v1
autowash.api.base-path=/api/v1
autowash.email.provider=${AUTOWASH_MAIL_PROVIDER:resend}
autowash.email.from=${AUTOWASH_MAIL_FROM:auracarwash.vn@gmail.com}
autowash.email.from-name=${AUTOWASH_MAIL_FROM_NAME:AURA Car Wash}
autowash.email.resend-api-key=${AUTOWASH_RESEND_API_KEY:}
autowash.email.templates.verify-register-otp-id=${AUTOWASH_VERIFY_REGISTER_OTP_TEMPLATE_ID:19694ae4-8fb6-4173-b69e-5046b2da2b77}
autowash.auth.jwt.secret=${AUTOWASH_JWT_SECRET:autowash-secret-key-for-jwt-signing-2026}
# 15 minutes
autowash.auth.jwt.access-token-expiration-seconds=${AUTOWASH_JWT_ACCESS_TTL:900}
# 7 days
autowash.auth.jwt.refresh-token-expiration-seconds=${AUTOWASH_JWT_REFRESH_TTL:604800}
# 5 minutes
autowash.auth.otp.expiration-seconds=${AUTOWASH_OTP_TTL:300}
autowash.auth.otp.max-attempts=${AUTOWASH_OTP_MAX_ATTEMPTS:5}
autowash.auth.otp.expose-for-dev=${AUTOWASH_OTP_EXPOSE_FOR_DEV:true}
autowash.auth.google.client-id=${AUTOWASH_GOOGLE_CLIENT_ID:}
autowash.auth.google.client-secret=${AUTOWASH_GOOGLE_CLIENT_SECRET:}
autowash.auth.google.redirect-uri=${AUTOWASH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
autowash.auth.google.frontend-base-url=${AUTOWASH_FRONTEND_BASE_URL:http://localhost:3000}
# 5 minutes
autowash.auth.google.ticket-ttl-seconds=${AUTOWASH_GOOGLE_TICKET_TTL:300}
autowash.storage.s3.enabled=${AUTOWASH_S3_ENABLED:false}
autowash.storage.s3.region=${AUTOWASH_S3_REGION:ap-southeast-1}
autowash.storage.s3.bucket=${AUTOWASH_S3_BUCKET:}
autowash.storage.s3.access-key=${AUTOWASH_S3_ACCESS_KEY:}
autowash.storage.s3.secret-key=${AUTOWASH_S3_SECRET_KEY:}
autowash.storage.s3.endpoint=${AUTOWASH_S3_ENDPOINT:}
autowash.storage.s3.public-base-url=${AUTOWASH_S3_PUBLIC_BASE_URL:}
autowash.storage.s3.upload-url-ttl-seconds=${AUTOWASH_S3_UPLOAD_URL_TTL:300}
autowash.storage.s3.max-avatar-size-bytes=${AUTOWASH_S3_MAX_AVATAR_SIZE_BYTES:5242880}
# 5 minutes
autowash.booking.otp.expiration-seconds=${AUTOWASH_BOOKING_OTP_TTL:300}
autowash.booking.otp.max-attempts=${AUTOWASH_BOOKING_OTP_MAX_ATTEMPTS:3}
autowash.booking.otp.resend-limit-per-hour=${AUTOWASH_BOOKING_OTP_RESEND_LIMIT:3}
autowash.booking.otp.send-retry-attempts=${AUTOWASH_BOOKING_OTP_SEND_RETRY_ATTEMPTS:3}
# 30 seconds
autowash.booking.otp.expiry-scan-delay-ms=${AUTOWASH_BOOKING_OTP_EXPIRY_SCAN_DELAY_MS:30000}
autowash.booking.otp.expose-for-dev=${AUTOWASH_BOOKING_OTP_EXPOSE_FOR_DEV:true}
autowash.booking.operating-hours.start=${AUTOWASH_BOOKING_OPEN_TIME:08:00}
autowash.booking.operating-hours.end=${AUTOWASH_BOOKING_CLOSE_TIME:20:00}
autowash.booking.max-advance-days=${AUTOWASH_BOOKING_MAX_ADVANCE_DAYS:30}
autowash.booking.no-show.grace-minutes=${AUTOWASH_BOOKING_NO_SHOW_GRACE_MINUTES:15}
autowash.booking.no-show.scan-delay-ms=${AUTOWASH_BOOKING_NO_SHOW_SCAN_DELAY_MS:60000}
autowash.booking.no-show.initial-delay-ms=${AUTOWASH_BOOKING_NO_SHOW_INITIAL_DELAY_MS:60000}
