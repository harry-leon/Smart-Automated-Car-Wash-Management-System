spring:
  datasource:
    url: jdbc:h2:mem:autowash;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/testdata
    clean-on-validation-error: true
    clean-disabled: false
  jpa:
    database-platform: com.autowash.shared.config.H2NamedEnumDialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        hbm2ddl:
          auto: none
autowash:
  email:
    provider: logging
  auth:
    otp:
      max-attempts: 5
      expose-for-dev: true
