spring:
  application:
    name: autowash-backend
  security:
    user:
      name: ${AUTOWASH_SECURITY_USER:autowash}
      password: ${AUTOWASH_SECURITY_PASSWORD:autowash-dev-password}
  datasource:
    url: ${AUTOWASH_DB_URL:jdbc:postgresql://localhost:5432/autowash}
    username: ${AUTOWASH_DB_USERNAME:autowash}
    password: ${AUTOWASH_DB_PASSWORD:autowash}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AutoWashPostgresPool
      maximum-pool-size: ${AUTOWASH_DB_POOL_SIZE:10}
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

autowash:
  api:
    version: v1
    base-path: /api/v1
