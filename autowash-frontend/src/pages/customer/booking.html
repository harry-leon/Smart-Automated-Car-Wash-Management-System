<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dat lich - AutoWash Pro</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/index.html"><img src="/src/assets/images/logo.png" alt="" />AutoWash Pro</a>
        <nav class="nav"><a data-nav-link href="/src/pages/customer/home.html">Customer Home</a></nav>
      </div>
    </header>
    <main class="page">
      <div class="container grid grid--2">
        <section class="stack">
          <h1 class="page-title">Dat lich rua xe</h1>
          <div class="grid booking-steps">
            <article class="booking-step surface panel">Chon xe va bien so.</article>
            <article class="booking-step surface panel">Chon goi dich vu, add-on, voucher.</article>
            <article class="booking-step surface panel">Chon ngay gio, thanh toan va xac nhan.</article>
          </div>
        </section>
        <form class="form surface panel" data-booking-form>
          <div class="field">
            <label for="plate">Bien so</label>
            <input id="plate" name="plate" placeholder="51G-12345" required />
            <span class="field-error" data-error-for="plate"></span>
          </div>
          <div class="field">
            <label for="packageId">Goi dich vu</label>
            <select id="packageId" name="packageId">
              <option value="standard">Standard Wash - 120.000 VND</option>
              <option value="premium">Premium Wash - 220.000 VND</option>
              <option value="ceramic">Ceramic Care - 420.000 VND</option>
            </select>
          </div>
          <fieldset class="field">
            <legend>Add-ons</legend>
            <label><input type="checkbox" name="addons" value="tire" /> Cham soc lop</label>
            <label><input type="checkbox" name="addons" value="engine" /> Ve sinh khoang may</label>
            <label><input type="checkbox" name="addons" value="deodorize" /> Khu mui noi that</label>
          </fieldset>
          <div class="grid grid--2">
            <div class="field"><label for="bookingDate">Ngay</label><input id="bookingDate" name="bookingDate" type="date" required /></div>
            <div class="field"><label for="bookingTime">Gio</label><input id="bookingTime" name="bookingTime" type="time" value="10:30" required /></div>
          </div>
          <div class="field">
            <label for="voucherCode">Voucher</label>
            <input id="voucherCode" name="voucherCode" placeholder="AURA50" />
          </div>
          <div class="field">
            <label for="paymentMethod">Thanh toan</label>
            <select id="paymentMethod" name="paymentMethod">
              <option value="BANK_TRANSFER">Chuyen khoan ngan hang</option>
              <option value="E_WALLET">Vi dien tu</option>
              <option value="CASH_AT_COUNTER">Tien mat tai quay</option>
            </select>
          </div>
          <div class="split">
            <strong>Tong tien</strong>
            <strong data-booking-total>0 VND</strong>
          </div>
          <button class="button" type="submit">Xac nhan dat lich</button>
        </form>
      </div>
    </main>
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
