<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Home - AutoWash Pro</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/index.html"><img src="/src/assets/images/logo.png" alt="" />AutoWash Pro</a>
        <nav class="nav">
          <a data-nav-link href="/src/pages/customer/home.html">Trang chu</a>
          <a data-nav-link href="/src/pages/customer/booking.html">Dat lich</a>
        </nav>
      </div>
    </header>
    <main class="page">
      <div class="container stack">
        <div class="split">
          <div>
            <h1 class="page-title">Customer Portal</h1>
            <p class="text-muted">Quan ly xe, dat lich rua va theo doi diem thuong.</p>
          </div>
          <a class="button" href="/src/pages/customer/booking.html">Dat lich moi</a>
        </div>
        <section class="grid grid--3">
          <article class="metric-card"><span class="text-muted">Diem hien co</span><strong>1,250</strong></article>
          <article class="metric-card"><span class="text-muted">Voucher active</span><strong>3</strong></article>
          <article class="metric-card"><span class="text-muted">Booking sap toi</span><strong>2</strong></article>
        </section>
        <section class="surface panel" data-last-booking>
          <h2 class="section-title">Chua co booking moi trong phien nay</h2>
          <p class="text-muted">Sau khi dat lich, thong tin gan nhat se hien tai day.</p>
        </section>
      </div>
    </main>
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
