<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Queue - AutoWash Pro</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/index.html"><img src="/src/assets/images/logo.png" alt="" />AutoWash Pro</a>
        <nav class="nav"><a data-nav-link href="/src/pages/staff/queue.html">Hang doi</a></nav>
      </div>
    </header>
    <main class="page">
      <div class="container stack">
        <h1 class="page-title">Staff Operations</h1>
        <section class="queue-board" data-queue-board>
          <div class="queue-column surface panel" data-status="Pending"><h2 class="section-title">Pending</h2><div class="stack" data-queue-list></div></div>
          <div class="queue-column surface panel" data-status="Checked-In"><h2 class="section-title">Checked-In</h2><div class="stack" data-queue-list></div></div>
          <div class="queue-column surface panel" data-status="In Progress"><h2 class="section-title">In Progress</h2><div class="stack" data-queue-list></div></div>
          <div class="queue-column surface panel" data-status="Completed"><h2 class="section-title">Completed</h2><div class="stack" data-queue-list></div></div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
