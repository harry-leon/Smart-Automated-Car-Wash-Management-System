<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - AutoWash Pro</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/index.html"><img src="/src/assets/images/logo.png" alt="" />AutoWash Pro</a>
        <nav class="nav"><a data-nav-link href="/src/pages/admin/dashboard.html">Dashboard</a></nav>
      </div>
    </header>
    <main class="page">
      <div class="container stack">
        <div class="admin-toolbar">
          <div>
            <h1 class="page-title">Admin Dashboard</h1>
            <p class="text-muted">KPI, booking va tong quan van hanh.</p>
          </div>
          <span class="badge" data-tone="success">Realtime-ready</span>
        </div>
        <section class="grid grid--3">
          <article class="metric-card"><span class="text-muted">Doanh thu thang</span><strong data-admin-revenue>0 VND</strong></article>
          <article class="metric-card"><span class="text-muted">Booking hom nay</span><strong>42</strong></article>
          <article class="metric-card"><span class="text-muted">Ti le hoan thanh</span><strong>94%</strong></article>
        </section>
        <section class="surface panel table-wrap">
          <h2 class="section-title">Booking gan day</h2>
          <table class="table">
            <thead><tr><th>Ma</th><th>Khach hang</th><th>Bien so</th><th>Trang thai</th></tr></thead>
            <tbody>
              <tr><td>AW-1026</td><td>Nguyen An</td><td>51B-88888</td><td><span class="badge" data-tone="warning">Dang rua</span></td></tr>
              <tr><td>AW-1025</td><td>Tran Binh</td><td>30H-45678</td><td><span class="badge" data-tone="info">Da check-in</span></td></tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
