<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xac thuc OTP - AutoWash Pro</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="surface panel auth-card">
        <header>
          <h1 class="section-title">Xac thuc OTP</h1>
          <p class="text-muted">Nhap ma 6 chu so de kich hoat tai khoan.</p>
        </header>
        <form class="form" data-otp-form>
          <div class="field">
            <label for="otp">Ma OTP</label>
            <input id="otp" name="otp" inputmode="numeric" maxlength="6" placeholder="123456" required />
            <span class="field-error" data-error-for="otp"></span>
          </div>
          <button class="button" type="submit">Xac thuc</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
